<!DOCTYPE html>
<html>
    <head>
        <title>AI Resume Builder</title>
        <style>
            body {
                font-family: Arial;
                background: linear-gradient(to right, #4facfe);
                text-align: center;
                margin: 0;
            }
            header{
                background-color: #222;
                color: white;
                padding: 20px;
                font-size: 24px;
            }
            .container{
                margin-top: 100px;
            }
            h1{
                font-size: 40px;
            }
            p{
                font-size: 18px;
                color: #333;
            }
            button{
                padding: 12px 25px;
                margin: 15px;
                border: none;
                background-color: #222;
                color: white;
                font-size: 16px;
                cursor: pointer;
                border-radius: 5px;
            }
            button:hover{
                background-color: #555;
            }
        </style>  
    </head>   
    
    <body>
        <header>
            AI Based Resume Builder and Job Suggestion
        </header>
        
        <div class="container">
         <h1>Create Professional Resumes</h1>   
        <p>Create your resume easily and discover job opportunities based on your skills.</p>

        <a href="/signup">
        <button>Signup</button>
        </a>
        <a href="/login">
        <button>Login</button>
        </a>
        
    </div>
</body>
</html>
